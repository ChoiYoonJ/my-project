<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIN MEMEBER</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'맑은 고딕', sans-serif;
            background:#fff;
            padding:40px 20px;
        }

        .join-box{
            width:100%;
            max-width:550px;
            margin:0 auto;
            padding-top: 100px;
        }

        .join-title{
            text-align:center;
            font-family:'Times New Roman', serif;
            font-size:clamp(32px,5vw,48px);
            letter-spacing:2px;
            margin-bottom:50px;
            color:#333;
        }

        .form-group{
            display:flex;
            align-items:center;
            gap:20px;
            margin-bottom:18px;
        }

        .form-group label{
            width:110px;
            font-size:14px;
            color:#333;
        }

        .form-group input{
            flex:1;
            height:42px;
            border:2px solid #444;
            border-radius:4px;
            padding:0 15px;
            font-size:14px;
        }

        .button-group{
            display:flex;
            justify-content:center;
            gap:30px;
            margin-top:40px;
        }

        .btn{
            width:100px;
            height:40px;
            border:none;
            border-radius:5px;
            background:#ddd;
            cursor:pointer;
            font-size:14px;
        }

        .btn:hover{
            background:#c8c8c8;
        }

        /* 모바일 */
        @media(max-width:480px){

            .form-group{
                flex-direction:column;
                align-items:flex-start;
                gap:8px;
            }

            .form-group label{
                width:100%;
            }

            .form-group input{
                width:100%;
            }

            .button-group{
                flex-direction:column;
                gap:15px;
            }

            .btn{
                width:100%;
            }
        }
    </style>
</head>
<body>

<div class="join-box">

    <h1 class="join-title">JOIN MEMBER</h1>

    <div class="form-group">
        <label>이메일 아이디</label>
        <input type="email"
               placeholder="유효한 이메일 주소를 입력해주세요">
    </div>

    <div class="form-group">
        <label>비밀번호</label>
        <input type="password"
               placeholder="영문+숫자+특수문자 조합 8~16자리">
    </div>

    <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password">
    </div>

    <div class="form-group">
        <label>이름</label>
        <input type="text">
    </div>

    <div class="button-group">
        <button class="btn">취소</button>
        <button class="btn">확인</button>
    </div>

</div>

</body>
</html>
