<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMate</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'맑은 고딕', sans-serif;
            background:#f5f5f5;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-container{
            width:100%;
            max-width:500px;
            padding:20px;
        }

        .logo{
            text-align:center;
            font-size:52px;
            font-weight:800;
            margin-bottom:40px;
        }

        .login-form{
            display:flex;
            justify-content:center;
            gap:10px;
        }

        .input-group{
            flex:1;
        }

        .input-group input{
            width:100%;
            height:45px;
            border:1.5px solid #333;
            border-radius:4px;
            padding:0 15px;
            margin-bottom:10px;
            font-size:14px;
        }

        .login-btn{
            width:90px;
            height:100px;
            border:none;
            border-radius:4px;
            background:#000;
            color:#fff;
            cursor:pointer;
            font-size:14px;
        }

        .login-btn:hover{
            opacity:0.9;
        }

        .find-area{
            margin-top:20px;
            text-align:center;
            font-size:13px;
            color:#666;
        }

        .find-area a{
            text-decoration:none;
            color:#666;
        }

        .find-area span{
            margin:0 8px;
        }

        .social-area{
            margin-top:40px;

            display:flex;
            justify-content:center;
            align-items:center;
            gap:20px;

            font-size:14px;
        }

        .signup-link{
            text-decoration:none;   /* 밑줄 제거 */
            color: black;
            font-size:14px;
            cursor:pointer;
        }

        .signup-link:visited{
            color:black;
            text-decoration:none;
        }

        .signup-link:hover{
            text-decoration:underline; /* 마우스 올리면 밑줄 */
        }

        .social-icons{
            display:flex;
            gap:15px;
        }

        .social{
            width:32px;
            height:32px;
            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            font-weight:bold;
            cursor:pointer;
        }

        .kakao{
            background:#FEE500;
            color:#000;
        }

        .naver{
            background:#03C75A;
            color:#fff;
        }

        .google{
            border:1px solid #ddd;
            background:#fff;
        }

        /* 모바일 */
        @media(max-width:600px){

            .logo{
                font-size:40px;
            }

            .login-form{
                flex-direction:column;
            }

            .login-btn{
                width:100%;
                height:45px;
            }

            .social-area{
                flex-direction:column;
                gap:15px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="logo">DocMate</div>

    <div class="login-form">

        <div class="input-group">
            <input type="email"
                   placeholder="이메일 아이디를 입력해주세요.">

            <input type="password"
                   placeholder="비밀번호를 입력해주세요.">
        </div>

        <button class="login-btn">
            로그인
        </button>

    </div>

    <div class="find-area">
        <a href="#">아이디 찾기</a>
        <span>|</span>
        <a href="#">비밀번호 찾기</a>
    </div>

    <div class="social-area">
        <a href="join.html" class="signup-link">
            이메일로 회원가입
        </a>

        <div>또는</div>

        <div class="social-icons">
            <div class="social kakao">●</div>
            <div class="social naver">N</div>
            <div class="social google">G</div>
        </div>
    </div>

</div>

</body>
</html>
